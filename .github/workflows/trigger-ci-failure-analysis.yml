name: Trigger CI Failure Analysis

on:
  workflow_run:
    workflows:
      - PromoAgent Code Review
      - Deploy Frontend
    types: [completed]

permissions:
  actions: write
  contents: read

jobs:
  dispatch-analysis:
    name: Dispatch local CI analysis agent
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.name != 'Trigger CI Failure Analysis'
    runs-on: ubuntu-latest

    steps:
      - name: Dispatch local analysis workflow
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.event.repository.owner.login }}
          REPO: ${{ github.event.repository.name }}
          RUN_ID: ${{ github.event.workflow_run.id }}
          RUN_URL: ${{ github.event.workflow_run.html_url }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name }}
          BRANCH: ${{ github.event.workflow_run.head_branch }}
          PR_NUMBER: ${{ github.event.workflow_run.pull_requests[0].number }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          if [ -z "$PR_NUMBER" ]; then
            echo "No PR associated with failed workflow run; skipping analysis."
            exit 0
          fi

          gh workflow run ci-failure-analysis.md \
            --repo "$OWNER/$REPO" \
            --ref "$DEFAULT_BRANCH" \
            -f owner="$OWNER" \
            -f repo="$REPO" \
            -f run_id="$RUN_ID" \
            -f run_url="$RUN_URL" \
            -f workflow_name="$WORKFLOW_NAME" \
            -f pr_number="$PR_NUMBER" \
            -f branch="$BRANCH"
