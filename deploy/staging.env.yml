# ---------------------------------------------------------------------------
# THIS FILE IS FOR REFERENCE ONLY
#
# Environment variables are now managed through the pipeline template:
#   - Non-secret values → stagingEnvVars in azure-pipelines.yml
#   - Secret values     → Key Vault via variable groups (kst-ai-shared, kst-ai-stage)
#
# See the pipeline repo docs: docs/ONBOARDING.md
# ---------------------------------------------------------------------------

# Secrets stored in Key Vault (kst-ai-keyvault):
#   AZURE-SEARCH-KEY            → AZURE_SEARCH_KEY
#   AZURE-OPENAI-KEY            → AZURE_OPENAI_KEY
#   AZURE-OPENAI-CHAT-KEY       → AZURE_OPENAI_CHAT_KEY
#   AZURE-STORAGE-CONN-STRING   → AZURE_STORAGE_CONNECTION_STRING
#   AZURE-DOC-INTEL-KEY         → AZURE_DOCUMENT_INTELLIGENCE_KEY

# Non-secret config (set in azure-pipelines.yml → stagingEnvVars):
#   AZURE_SEARCH_ENDPOINT, AZURE_SEARCH_INDEX_NAME
#   AZURE_OPENAI_ENDPOINT, AZURE_OPENAI_EMBEDDING_DEPLOYMENT
#   AZURE_OPENAI_CHAT_ENDPOINT, AZURE_OPENAI_CHAT_DEPLOYMENT
#   CHAT_PROVIDER, AZURE_CREDENTIAL_TYPE
#   AZURE_AI_PROJECT_ENDPOINT, AZURE_AI_MODEL_DEPLOYMENT_NAME
#   ENTRA_TENANT_ID, ENTRA_API_CLIENT_ID, AUTH_ENABLED
#   CORS_ORIGINS, ENVIRONMENT, ALLOW_DEBUG, RATE_LIMIT
